name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradlew'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradlew'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: |
          set +e
          OUTPUT=$(./gradlew assembleDebug 2>&1)
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Gradle build failed (exit code $EXIT_CODE)"
            echo "$OUTPUT" | grep -iE "error:|fail|what went wrong|build failed" | head -20
            echo "---"
            echo "$OUTPUT" | tail -30
            exit $EXIT_CODE
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
